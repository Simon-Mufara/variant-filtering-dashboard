name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=utils --cov-report=term-missing

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 utils/ app.py --max-line-length=120 --ignore=E501,W503
